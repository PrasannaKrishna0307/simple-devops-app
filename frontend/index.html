<!DOCTYPE html>
<html>
<head>
  <title>Simple App</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 50px;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }
    #output {
      margin-top: 20px;
      font-size: 18px;
      color: green;
    }
  </style>
</head>
<body>

  <h1>Frontend</h1>

  <button onclick="callAPI()">Call Backend</button>

  <p id="output">Click the button to fetch data...</p>

  <script>
    async function callAPI() {
      try {
        const res = await fetch("http://52.66.206.113:3000", {
          cache: "no-store"
        });

        const data = await res.text();

        document.getElementById("output").innerText = data;

      } catch (error) {
        document.getElementById("output").innerText = "Error connecting to backend";
        console.error(error);
      }
    }
  </script>

</body>
</html>
